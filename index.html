<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Results summary component</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="card-1">
        <h2>Your Result</h2>
        <div class="status">
          <p id="average">76</p>
          <p id="total">of 100</p>
        </div>
        <h1>Great</h1>
        <p>
          You scored higher than 65% of the people who have taken these tests.
        </p>
      </div>

      <div class="card-2">
        <h2>Summary</h2>
        <div class="box" style="background-color: hsla(0, 100%, 94%, 0.519)">
          <div class="row-left">
            <img src="assets/images/icon-reaction.svg" alt="reaction" />
            <span style="color: hsl(0, 72%, 62%);">Reaction</span>
          </div>
          <div class="row-right">
            <span><b>80</b></span>
            <span style="color: gray;">/ 100</span>
          </div>
        </div>
        <div class="box" style="background-color: hsla(39, 81%, 73%, 0.164)">
          <div class="row-left">
            <img src="assets/images/icon-memory.svg" alt="reaction" />
            <span style="color: hsl(39, 80%, 56%);">Memory</span>
          </div>
          <div class="row-right">
            <span><b>92</b></span>
            <span style="color: gray;">/ 100</span>
          </div>
        </div>
        <div class="box" style="background-color: hsla(166, 62%, 75%, 0.19);">
          <div class="row-left">
            <img src="assets/images/icon-verbal.svg" alt="reaction" />
            <span style="color: hsl(166, 92%, 44%);">Verbal</span>
          </div>
          <div class="row-right">
            <span><b>61</b></span>
            <span style="color: gray;">/ 100</span>
          </div>
        </div>
        <div class="box" style="background-color: hsla(234, 85%, 45%, 0.119);">
          <div class="row-left">
            <img src="assets/images/icon-visual.svg" alt="reaction" />
            <span style="color: hsl(234, 85%, 45%);">Visual</span>
          </div>
          <div class="row-right">
            <span><b>73</b></span>
            <span style="color: gray;">/ 100</span>
          </div>
        </div>
        <div class="box">
          <span>Continue</span>
        </div>
      </div>
    </div>
  </body>
</html>
